# ===========================
# Server
# ===========================
server.port=${PORT:8080}

# ===========================
# Database - MySQL (Production)
# ===========================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:eventifydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (dev only)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ===========================
# JWT
# ===========================
app.jwt.secret=${JWT_SECRET:eventify-super-secret-key-change-in-production-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===========================
# Logging
# ===========================
logging.level.com.example.eventmanagement=INFO
logging.level.org.springframework.security=WARN
