# 1. Server Port (Keep your 8084 setting)
server.port=8084

# 2. MySQL Connection (Pointing to the DB in your Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/eventdb1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate
# 'update' ensures it uses your existing Workbench tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Disable H2 (Optional, but stops confusion)
spring.h2.console.enabled=false